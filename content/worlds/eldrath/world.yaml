summary: >-
  Eldrath é um mundo de fantasia mágica vivo no qual a história emerge do
  encontro entre aspirações pessoais, necessidades cotidianas, instituições e
  forças extraordinárias. Pessoas comuns e poderosas compartilham a capacidade
  de produzir mudanças: trabalho, escassez, afeto, rivalidade, fé, decisão
  política, descoberta e magia podem alterar relações e atravessar gerações.
  Nada relevante acontece sem causas, e nada termina sem deixar vestígios. O
  passado é preservado, mas permanece parcialmente conhecido e sujeito a
  memória, interesse e interpretação. A magia oferece possibilidades reais
  condicionadas por conhecimento, acesso, custo, risco e consequência, sem
  tornar profissões, recursos ou escolhas comuns irrelevantes. Ameaças naturais,
  monstruosas, demoníacas ou arcanas podem agir de forma sistêmica, mas não
  substituem economia, política, religião ou vida social. Eldrath comporta
  ascensão e decadência, guerra e reconstrução, amor e rivalidade, migração,
  descoberta, esperança e lenda sem exigir herói, profecia ou mal absoluto.
references: []
